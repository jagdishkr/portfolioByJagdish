<div class="chatbot-container" [class.open]="isOpen">
  <div class="chat-header">
    <h3>Jagdish's AI Assistant</h3>
    <button (click)="toggleChat()" class="close-btn" aria-label="Close chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </div>

  <div class="chat-messages">
    <div *ngFor="let msg of messages" [class.user-msg]="msg.sender === 'user'" [class.bot-msg]="msg.sender === 'bot'" class="message">
      <div class="message-content">
        <p>{{ msg.text }}</p>
      </div>
    </div>

    <div *ngIf="isLoading" class="message bot-msg typing">
      <div class="message-content">
        <span class="typing-indicator">
          <span></span><span></span><span></span>
        </span>
      </div>
    </div>
  </div>

  <div class="chat-input-area">
    <textarea
      [(ngModel)]="inputMessage"
      (keypress)="handleKeyPress($event)"
      placeholder="Type your message..."
      class="chat-input"
      [disabled]="isLoading"
    ></textarea>
    <button (click)="sendMessage()" class="send-btn" [disabled]="!inputMessage.trim() || isLoading" aria-label="Send message">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M16.6915026,12.4744748 L3.50612381,13.2599618 C3.19218622,13.2599618 3.03521743,13.4170592 3.03521743,13.5741566 L1.15159189,20.0151496 C0.8376543,20.8006365 0.99,21.89 1.77946707,22.52 C2.41,22.99 3.50612381,23.1 4.13399899,22.8429026 L21.714504,14.0454487 C22.6563168,13.5741566 23.1272231,12.6315722 22.9702544,11.6889879 C22.9702544,11.6889879 22.9702544,11.6889879 22.9702544,11.6889879 L4.13399899,1.16346273 C3.34915502,0.9 2.40734225,1.00636533 1.77946707,1.4776575 C0.994623095,2.10604706 0.837654326,3.0486314 1.15159189,3.98021575 L3.03521743,10.4212088 C3.03521743,10.5783061 3.34915502,10.7354035 3.50612381,10.7354035 L16.6915026,11.5208905 C16.6915026,11.5208905 17.1624089,11.5208905 17.1624089,11.0496 L17.1624089,12.0921843 C17.1624089,12.4744748 16.6915026,12.4744748 16.6915026,12.4744748 Z"/>
      </svg>
    </button>
  </div>
</div>

<button 
  *ngIf="!isOpen" 
  (click)="toggleChat()" 
  class="chat-toggle"
  aria-label="Open chat"
>
  <svg viewBox="0 0 24 24" fill="currentColor">
    <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
  </svg>
  <span class="pulse"></span>
</button>
