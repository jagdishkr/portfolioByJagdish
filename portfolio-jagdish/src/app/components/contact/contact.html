<section class="contact" id="contact">
  <div class="container">
    <div class="contact-content">
      <h2>Let's Connect</h2>
      <p class="tagline">Open to select roles & collaborations — work with me</p>
      
      <div class="social-buttons">
        <a class="social-btn linkedin" [href]="'https://' + portfolio?.contact?.linkedin" target="_blank">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.475-2.236-1.986-2.236-1.081 0-1.722.725-2.004 1.426-.103.249-.129.597-.129.946v5.433h-3.554s.047-8.812 0-9.737h3.554v1.379c-.009.015-.021.03-.03.045h.03v-.045c.427-.659 1.191-1.6 2.897-1.6 2.117 0 3.704 1.385 3.704 4.362v5.596zM5.337 5.431c-1.144 0-1.915-.761-1.915-1.713 0-.951.771-1.712 1.955-1.712 1.183 0 1.915.761 1.915 1.712 0 .952-.732 1.713-1.955 1.713zm1.946 15.021H3.392V8.716h3.891v11.736zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.225 0z"/>
          </svg>
          <span>Connect on LinkedIn</span>
        </a>
        
        <a class="social-btn github" [href]="'https://' + portfolio?.contact?.github" target="_blank">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v 3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
          </svg>
          <span>Follow on GitHub</span>
        </a>
      </div>

      <div class="contact-methods">
        <div class="method-card email">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
          </svg>
          <h4>Email</h4>
          <a [href]="'mailto:' + portfolio?.contact?.email">{{ portfolio?.contact?.email }}</a>
        </div>
      </div>

      <button class="btn btn-primary">
        <span>Get in Touch</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>
    </div>
  </div>
</section>
