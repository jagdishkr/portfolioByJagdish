<section class="featured-work" id="projects">
  <div class="container">
    <h2>Featured Work</h2>
    <p class="subtitle">Enterprise AI & cloud projects</p>
    
    <div class="projects-grid">
      <div *ngFor="let project of portfolio?.projects" class="project-card">
        <div class="project-category">{{ project.category }}</div>
        <h3>{{ project.title }}</h3>
        <p class="project-description">{{ project.description }}</p>
        <div class="technologies">
          <span *ngFor="let tech of project.technologies" class="tech-tag">
            {{ tech }}
          </span>
        </div>
      </div>
    </div>
  </div>
</section>
