<section class="hero" id="home">
  <div class="hero-content">
    <div class="hero-text">
      <h1>{{ portfolio?.hero?.name }}</h1>
      <h2 class="titles">{{ portfolio?.hero?.titles?.join(' · ') }}</h2>
      <p class="tagline">{{ portfolio?.hero?.tagline }}</p>
      <p class="bio">{{ portfolio?.hero?.bio }}</p>
      <div class="cta-buttons">
        <button class="btn btn-primary">View My Work</button>
        <button class="btn btn-secondary">Get in Touch</button>
      </div>
    </div>
  </div>
</section>
