<section class="experience" id="experience">
  <div class="container">
    <h2>Experience</h2>
    <p class="subtitle">11+ years shipping at enterprise scale.</p>
    
    <div class="timeline">
      <div *ngFor="let exp of portfolio?.experience; let i = index" 
           [class.left]="i % 2 === 0" 
           [class.right]="i % 2 !== 0"
           class="timeline-item">
        <div class="timeline-marker">
          <div class="timeline-dot"></div>
        </div>
        <div class="timeline-content">
          <div class="experience-header">
            <h3>{{ exp.title }}</h3>
            <span class="company">{{ exp.company }}</span>
          </div>
          <span class="period">{{ exp.period }}</span>
          <p class="description">{{ exp.description }}</p>
        </div>
      </div>
    </div>
  </div>
</section>
